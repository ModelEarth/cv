<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<title>Team CVs</title>
<link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!--

<script>
if(typeof param=='undefined'){ var param={}; }
param.showsearch = "false"; // Set to true to include search bar
</script>

<link type="text/css" rel="stylesheet" href="/localsite/css/base.css" id="/localsite/css/base.css" />
<script type="text/javascript" src="/localsite/js/localsite.js?showheader=true&showsearch=true"></script>

<script>
loadMarkdown("README.md", "guidanceDiv", "_parent");
loadMarkdown("common/README.md", "commonDiv", "_parent");
loadMarkdown("bios.md", "bioDiv", "_parent");
loadMarkdown("PLAN.md", "planDiv", "_parent");
</script>

<style>
/*
.bio {
  clear:both;
  margin-bottom: 20px;
  display:block;
}
*/
#bioDiv {
  container-type: inline-size;
}
#bioDiv hr {
  clear: both; /* since clear on p img tag did not work, and the p might not always be there. */
  opacity:0;
}
#bioDiv p:has(img) {
  float: left;
  width: 180px;
  margin: 0 30px 28px 0;
}
/* All images forced to circles, portraits cropped from bottom */
#bioDiv img {
    padding: 0px !important;
    margin: 0 !important;
    display: block;
    width: 180px !important;
    height: 180px !important;
    min-width: 180px !important;
    min-height: 180px !important;
    border-radius: 50% !important;
    object-fit: cover !important;
    object-position: center top !important;
}
.bioText {
  /*display: flow-root; */
  overflow:auto;
  margin-bottom: 28px;
}

.bioText h2 {
  margin: 0 0 8px;
}
@container (max-width: 760px) {
  #bioDiv p:has(img) {
    float: none;
    clear: both;
    width: auto;
    margin: 0 0 12px 0;
  }
  .bioText {
    overflow: visible;
    margin-bottom: 22px;
  }
}
@media print {
  .bioimage img {
      width: 140px !important;
      height: 140px !important;
      min-width: 140px !important;
      min-height: 140px !important;
  }
  #toplogos {
    margin-top: -40px;
    padding-bottom: 20px;
  }
}
</style>

</head>

<body>
<div class="content contentpadding large-list">
  <div id="guidanceDiv"></div>
  
  <div id="readmeDiv"></div>
  <div id="bioDiv"></div>
  <div id="planDiv"></div>

  <div id="commonDiv"></div>
</div>
</body>
</html>
